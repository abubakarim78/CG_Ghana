<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ChildGuard Ghana</title>
    <meta name="description" content="Protecting Children Through Safe Reporting" />
    <meta name="theme-color" content="#0A1628" />
    <style>
      /* Fill the full viewport — prevents blank white screen */
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #0D1620;
        overflow: hidden;
      }
      /* Mobile-app feel: constrain width on large screens */
      @media (min-width: 768px) {
        #root {
          max-width: 430px;
          margin: 0 auto;
          box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        body {
          background-color: #060e18;
        }
      }
      /* Hide scrollbar but keep scroll */
      ::-webkit-scrollbar { display: none; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
